<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Badge background -->
  <rect x="0" y="0" width="200" height="200" rx="44" fill="#1B1F3B"/>

  <!-- Large D letterform -->
  <text x="28" y="158" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
        font-size="158" font-weight="900" fill="#FFFFFF" opacity="0.08">D</text>

  <!-- Pen nib shape - the core icon -->
  <!-- Nib body: elongated diamond -->
  <polygon points="100,38  138,100  100,162  62,100" fill="none" stroke="#FFFFFF" stroke-width="5"/>
  <!-- Nib split line -->
  <line x1="100" y1="100" x2="100" y2="162" stroke="#FFFFFF" stroke-width="2.5" stroke-dasharray="none"/>
  <!-- Nib upper fill -->
  <polygon points="100,38  138,100  100,100  62,100" fill="#4B6EF5"/>
  <!-- Nib lower left -->
  <polygon points="62,100  100,100  100,162" fill="#FFFFFF" opacity="0.9"/>
  <!-- Nib lower right -->
  <polygon points="100,100  138,100  100,162" fill="#FFFFFF" opacity="0.55"/>
  <!-- Center slit -->
  <line x1="100" y1="108" x2="100" y2="162" stroke="#1B1F3B" stroke-width="3"/>

  <!-- Ink drop at nib tip -->
  <ellipse cx="100" cy="170" rx="5" ry="7" fill="#4B6EF5"/>

  <!-- Gold accent dot top -->
  <circle cx="100" cy="30" r="6" fill="#F5C542"/>

  <!-- Spark lines -->
  <line x1="154" y1="46" x2="164" y2="36" stroke="#F5C542" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="160" y1="58" x2="173" y2="54" stroke="#F5C542" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="148" y1="34" x2="152" y2="24" stroke="#F5C542" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>